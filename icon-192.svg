<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <rect fill="#ff8a1e" width="192" height="192"/>
  
  <!-- Gradient circle for depth -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffa94d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e3690a;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Fire emoji as main icon -->
  <text x="96" y="140" font-size="100" font-weight="bold" text-anchor="middle" fill="#1a1208" font-family="system-ui, -apple-system, sans-serif">🔥</text>
  
  <!-- Shine effect -->
  <circle cx="96" cy="96" r="90" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
</svg>
