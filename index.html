<!DOCTYPE html>
<html lang="hi">
<head>
  <link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nondescript MG - Live Meme List</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div id="backdrop" class="backdrop" style="display:none;"></div>

  <div class="wrap">

    <div class="topbar">
      <div>
        <span id="liveBadge" class="badge">NMG IS LIVE</span>
        <span id="offlineBadge" class="badge offline" style="display:none;">NMG IS OFFLINE</span>
      </div>
      <div class="nav-buttons">
        <button id="calendarBtn" class="nav-btn calendar-btn-topbar" title="View memes from another date">
          <span id="calendarBtnText">Previous</span>
        </button>
        <a class="nav-btn" href="submit.html">Share Meme</a>
      </div>
    </div>

    <h1>Aaj ka <span>Meme </span>Dose 🔥</h1>
    <p class="sub">Kabhi bhi dekho aur share karo — aaj aur pichle dino ke saare unclicked memes.</p>

    <div id="memeListSection" class="card">
      <div class="card-header">
        <h2>Meme List</h2>
      </div>
      <div id="status" class="hint">Loading...</div>
      <ul id="memeList" class="meme-list"></ul>
    </div>

    <footer>
      Made for <b>Nondescript MG</b> 🤡 — #LiveReaction
    </footer>

  </div>

  <!-- Date Picker Popup (Bottom Modal) -->
  <div id="datePickerPopup" class="date-picker-popup-bottom" style="display:none;">
    <div class="date-picker-header">
      <button id="prevMonth" class="date-nav-btn">❮</button>
      <div id="monthYearDisplay" class="month-year">June 2026</div>
      <button id="nextMonth" class="date-nav-btn">❯</button>
    </div>
    <div id="calendarGrid" class="calendar-grid"></div>
  </div>

  <script src="config.js"></script>
  <script src="index.js"></script>

</body>
</html>
