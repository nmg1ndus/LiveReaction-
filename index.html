<!DOCTYPE html>
<html lang="hi">
<head>
  <link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nondescript MG - Live Meme List</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="wrap">

    <div class="topbar">
      <div>
        <span id="liveBadge" class="badge">NMG IS LIVE</span>
        <span id="offlineBadge" class="badge offline" style="display:none;">NMG IS OFFLINE</span>
      </div>
      <div class="nav-buttons">
        <a class="nav-btn" href="submit.html">Share Meme</a>
      </div>
    </div>

    <h1>Aaj ka <span>Meme </span>Dose 🔥</h1>
    <p class="sub">Yahan vahi memes dikhenge jo aaj submit hue hain.</p>

    <div id="liveSection" class="card">
      <h2>Live Meme List</h2>
      <div id="status" class="hint">Loading...</div>
      <ul id="memeList" class="meme-list"></ul>
    </div>

    <div id="offlineSection" class="card" style="display:none; text-align:center;">
      <p style="margin:0; color:var(--muted);">List aaj ke memes dikhati hai.<br>Baad mein check karna!</p>
    </div>

    <footer>
      Made for <b>Nondescript MG</b> 🤡 — #LiveReaction
    </footer>

  </div>

  <script src="index.js"></script>

</body>
</html>
